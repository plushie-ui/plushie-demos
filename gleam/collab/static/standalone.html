<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plushie Demo - Standalone</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1em;
      background: #1a1a2e;
      color: #a8d8ea;
      font-family: system-ui, sans-serif;
      font-size: 1.2em;
      z-index: 10;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">Loading plushie-wasm...</div>
  <script type="module">
    // Mode 1: Standalone client-side app.
    //
    // Runs entirely in the browser. plushie-wasm provides the iced
    // renderer in WebAssembly. The app logic is a minimal counter
    // embedded directly in this page (the full Gleam-compiled JS
    // version would replace this).
    //
    // Each browser tab has its own independent state -- no server
    // communication, no shared state.

    const loading = document.getElementById('loading');

    // Load a font file and return its base64-encoded contents.
    // The WASM renderer has no access to system fonts -- fonts must
    // be provided as inline base64 data in the settings JSON.
    async function loadFontBase64(url) {
      const resp = await fetch(url);
      if (!resp.ok) return null;
      const buf = await resp.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    async function init() {
      let wasmInit, PlushieApp;
      try {
        const wasm = await import('./plushie_renderer_wasm.js');
        wasmInit = wasm.default;
        PlushieApp = wasm.PlushieApp;
        await wasmInit();
      } catch (e) {
        console.error('WASM load failed:', e);
        loading.innerHTML =
          '<div>plushie-wasm not found.</div>' +
          '<div>Failed to load plushie-wasm.</div>' +
          '<div style="font-size: 0.85em; color: #888; max-width: 500px; text-align: center;">' +
          'Copy plushie_renderer_wasm.js and plushie_renderer_wasm_bg.wasm to the static/ directory.' +
          '<p>' + e.message + '</p>' +
          '<p>Make sure plushie_renderer_wasm.js and plushie_renderer_wasm_bg.wasm ' +
          'are in the static/ directory (run <code>mix plushie.download</code>).</p>' +
          '</div>';
        return;
      }

      // Load the font for the WASM renderer. Without this, all text
      // renders as blank because cosmic-text has no system fonts in WASM.
      const fontData = await loadFontBase64('./FiraSans-Regular.ttf');
      const fonts = fontData ? [{ data: fontData }] : [];

      const settings = JSON.stringify({
        type: "settings",
        session: "",
        protocol_version: 1,
        antialiasing: true,
        default_text_size: 16.0,
        vsync: true,
        scale_factor: 1.0,
        default_event_rate: 30,
        fonts: fonts,
      });

      // Simple standalone counter state
      let model = { name: "", notes: "", count: 0, dark_mode: false };

      function renderSnapshot() {
        const theme_wrapper = model.dark_mode
          ? { type: "themer", id: "theme-root", props: { theme: "dark" }, children: [content()] }
          : { type: "themer", id: "theme-root", props: { theme: "light" }, children: [content()] };

        return JSON.stringify({
          type: "snapshot",
          session: "",
          tree: {
            type: "window",
            id: "main",
            props: { title: "Plushie Demo (Standalone)", width: 500, height: 450 },
            children: [theme_wrapper],
          },
        });
      }

      function content() {
        return {
          type: "column", id: "root",
          props: { padding: 20, spacing: 16, width: "fill" },
          children: [
            { type: "text", id: "header", props: { content: "Plushie Demo (Standalone)", size: 24.0 } },
            { type: "text", id: "status", props: { content: "Running locally in the browser" } },
            { type: "text_input", id: "name", props: { value: model.name, placeholder: "Your name" } },
            { type: "row", id: "counter-row", props: { spacing: 8 }, children: [
              { type: "button", id: "dec", props: { label: "-" } },
              { type: "text", id: "count", props: { content: "Count: " + model.count } },
              { type: "button", id: "inc", props: { label: "+" } },
            ]},
            { type: "checkbox", id: "theme", props: { label: "Dark mode", is_checked: model.dark_mode } },
            { type: "text_input", id: "notes", props: { value: model.notes, placeholder: "Notes...", width: "fill" } },
          ],
        };
      }

      const app = new PlushieApp(settings, (eventJson) => {
        const event = JSON.parse(eventJson);
        if (event.type !== "event") return;

        switch (event.family) {
          case "click":
            if (event.id === "inc") model.count++;
            if (event.id === "dec") model.count--;
            break;
          case "input":
            if (event.id === "name") model.name = event.data.value;
            if (event.id === "notes") model.notes = event.data.value;
            break;
          case "toggle":
            if (event.id === "theme") model.dark_mode = event.data.value;
            break;
          default:
            return;
        }

        app.send_message(renderSnapshot());
      });

      // Send initial snapshot
      app.send_message(renderSnapshot());
      loading.classList.add('hidden');
    }

    init();
  </script>
</body>
</html>

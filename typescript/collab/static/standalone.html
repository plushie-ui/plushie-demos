<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collab - Standalone</title>
  <style>
    body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: system-ui; }
    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #1a1a2e; z-index: 100;
      font-size: 1.2em;
    }
    #overlay.hidden { display: none; }
    .error { color: #e74c3c; }
  </style>
</head>
<body>
  <div id="overlay">Loading...</div>
  <script type="module">
    import init, { PlushieApp } from './plushie_wasm.js'

    const overlay = document.getElementById('overlay')
    function status(msg, isError) {
      overlay.textContent = msg
      overlay.className = isError ? 'error' : ''
    }

    try {
      status('Loading WASM...')
      await init()

      // The app runs entirely client-side. No server connection.
      // Each browser tab is independent.
      const app = new PlushieApp({
        antialiasing: true,
        default_event_rate: 30,
      })

      overlay.classList.add('hidden')

    } catch (err) {
      status(`Error: ${err.message}`, true)
    }
  </script>
</body>
</html>

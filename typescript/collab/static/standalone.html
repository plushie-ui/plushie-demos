<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collab - Standalone</title>
  <style>
    body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: system-ui; }
    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #1a1a2e; z-index: 100;
      font-size: 1.2em; flex-direction: column; gap: 12px;
    }
    #overlay.hidden { display: none; }
    .error { color: #e74c3c; }
    .note { color: #888; font-size: 0.85em; max-width: 400px; text-align: center; }
  </style>
</head>
<body>
  <div id="overlay">
    <div>Loading...</div>
    <div class="note">
      Client-side WASM mode: the app runs entirely in the browser.
      Each tab is independent -- no shared state.
    </div>
  </div>
  <script type="module">
    import init, { PlushieApp } from './plushie_wasm.js'

    const overlay = document.getElementById('overlay')
    const statusEl = overlay.querySelector('div')
    function status(msg, isError) {
      statusEl.textContent = msg
      if (isError) overlay.className = 'error'
    }

    try {
      status('Loading WASM...')
      await init()

      // Create the WASM renderer. In standalone mode, the renderer
      // runs the default empty app. For full app logic (init/update/view),
      // the SDK's Runtime would need to drive the renderer via
      // WasmTransport -- this requires the browser bundle
      // (pnpm build:browser) and Runtime browser support.
      const app = new PlushieApp({
        antialiasing: true,
        default_event_rate: 30,
      })

      overlay.classList.add('hidden')

    } catch (err) {
      status(`Error: ${err.message}`, true)
    }
  </script>
</body>
</html>

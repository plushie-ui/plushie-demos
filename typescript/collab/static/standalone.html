<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collab - Standalone</title>
  <style>
    body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: system-ui; }
    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #1a1a2e; z-index: 100;
      font-size: 1.2em; flex-direction: column; gap: 12px;
    }
    #overlay.hidden { display: none; }
    .error { color: #e74c3c; }
    .note { color: #888; font-size: 0.85em; max-width: 400px; text-align: center; }
  </style>
</head>
<body>
  <div id="overlay">
    <div>Loading...</div>
    <div class="note">
      Client-side WASM mode: the app runs entirely in the browser.
      Each tab is independent -- no shared state.
    </div>
  </div>
  <script type="module">
    import init, { PlushieApp } from './plushie_renderer_wasm.js'

    const overlay = document.getElementById('overlay')
    const statusEl = overlay.querySelector('div')
    function status(msg, isError) {
      statusEl.textContent = msg
      if (isError) overlay.className = 'error'
    }

    // The WASM renderer has no system fonts; provide one explicitly.
    async function loadFontBase64(url) {
      const resp = await fetch(url)
      if (!resp.ok) return null
      const buf = await resp.arrayBuffer()
      const bytes = new Uint8Array(buf)
      let binary = ''
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i])
      }
      return btoa(binary)
    }

    try {
      status('Loading WASM...')
      await init()

      const fontData = await loadFontBase64('./FiraSans-Regular.ttf')
      const fonts = fontData ? [{ data: fontData }] : []

      // Create the WASM renderer. In standalone mode, the renderer
      // runs the default empty app. For full app logic (init/update/view),
      // the SDK's Runtime would need to drive the renderer via
      // WasmTransport -- this requires the browser bundle
      // (pnpm build:browser) and Runtime browser support.
      const app = new PlushieApp({
        antialiasing: true,
        default_event_rate: 30,
        fonts,
      })

      overlay.classList.add('hidden')

    } catch (err) {
      console.error('WASM load failed:', err)
      overlay.innerHTML =
        '<div>Failed to load plushie-wasm.</div>' +
        '<div class="note">' +
        `<p>${err.message}</p>` +
        '<p>Make sure plushie_renderer_wasm.js and plushie_renderer_wasm_bg.wasm ' +
        'are in the static/ directory.</p>' +
        '</div>'
      overlay.className = 'error'
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collab - WebSocket</title>
  <style>
    body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: system-ui; }
    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #1a1a2e; z-index: 100;
      font-size: 1.2em;
    }
    #overlay.hidden { display: none; }
    .error { color: #e74c3c; }
  </style>
</head>
<body>
  <div id="overlay">Loading...</div>
  <script type="module">
    import init, { PlushieApp } from './plushie_renderer_wasm.js'

    const overlay = document.getElementById('overlay')
    function status(msg, isError) {
      overlay.textContent = msg
      overlay.className = isError ? 'error' : ''
      overlay.classList.remove('hidden')
    }

    try {
      status('Loading WASM...')
      await init()

      status('Connecting...')
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
      const ws = new WebSocket(`${proto}//${location.host}/ws`)

      ws.onopen = () => {
        status('Connected')
        // The server sends settings first; the WASM app responds with hello
      }

      ws.onerror = () => status('Connection error', true)
      ws.onclose = () => status('Disconnected', true)

      // Create the WASM plushie app
      const app = new PlushieApp({
        antialiasing: true,
        default_event_rate: 30,
        on_event: (eventJson) => {
          // Forward renderer events to the server
          ws.send(eventJson)
        }
      })

      // Forward server messages to the WASM renderer
      ws.onmessage = (e) => {
        app.send_message(e.data)
        // Hide overlay once we get the first message (settings or snapshot)
        overlay.classList.add('hidden')
      }

    } catch (err) {
      status(`Error: ${err.message}`, true)
    }
  </script>
</body>
</html>
